<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - SmartStudent Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
    <style>
        body {
            background: url('https://res.cloudinary.com/dkho9wtji/image/upload/v1743939621/nist_bg_prjtfu.gif') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(0,0,0,0.75);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            color: white;
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #4fc3f7;
            font-weight: bold;
        }
        .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.2);
            color: white;
            border-color: #4fc3f7;
            box-shadow: none;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        .btn-login {
            width: 100%;
            background: #4fc3f7;
            border: none;
            color: black;
            font-weight: bold;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .btn-login:hover { background: #81d4fa; }
        .btn-register {
            width: 100%;
            background: transparent;
            border: 1px solid #4fc3f7;
            color: #4fc3f7;
            font-weight: bold;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .btn-register:hover { background: rgba(79,195,247,0.1); }
        .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            padding: 10px 20px;
            cursor: pointer;
        }
        .tab-btn.active {
            color: #4fc3f7;
            border-bottom: 2px solid #4fc3f7;
        }
        #popupMsg {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            z-index: 9999;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="popupMsg" class="alert text-center d-none"></div>

    <div class="login-card">
        <h2>🎓 NIST Admin</h2>

        <!-- Tabs -->
        <div class="d-flex justify-content-center mb-3">
            <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
            <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginForm">
            <input type="email" id="loginEmail" class="form-control" placeholder="Email">
            <input type="password" id="loginPassword" class="form-control" placeholder="Password">
            <button class="btn-login" onclick="doLogin()">LOGIN</button>
        </div>

        <!-- OTP Form -->
        <div id="otpForm" style="display:none;">
            <p class="text-center text-white">OTP sent to your email</p>
            <input type="text" id="otpInput" class="form-control" placeholder="Enter OTP">
            <button class="btn-login" onclick="verifyOtp()">VERIFY OTP</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none;">
            <input type="email" id="regEmail" class="form-control" placeholder="Email">
            <input type="password" id="regPassword" class="form-control" placeholder="Password">
            <input type="password" id="regConfirm" class="form-control" placeholder="Confirm Password">
            <button class="btn-login" onclick="doRegister()">REGISTER</button>
        </div>

    </div>

    <script>
        function showPopup(message, type) {
            const popup = document.getElementById("popupMsg");
            popup.className = "alert alert-" + type + " text-center";
            popup.innerText = message;
            popup.classList.remove("d-none");
            setTimeout(() => popup.classList.add("d-none"), 3000);
        }

        function showTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('otpForm').style.display = 'none';
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
        }

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!email || !password) {
                showPopup("Please fill all fields", "warning");
                return;
            }

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const result = await res.json();

            if (result.success) {
                showPopup(result.message, "success");
                setTimeout(() => {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('otpForm').style.display = 'block';
                }, 1000);
            } else {
                showPopup(result.error, "danger");
            }
        }

        async function verifyOtp() {
            const otp = document.getElementById('otpInput').value.trim();

            if (!otp) {
                showPopup("Please enter OTP", "warning");
                return;
            }

            const res = await fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ otp })
            });
            const result = await res.json();

            if (result.success) {
                showPopup("Login successful!", "success");
                setTimeout(() => window.location.href = '/', 1000);
            } else {
                showPopup(result.error, "danger");
            }
        }

        async function doRegister() {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regConfirm').value.trim();

            if (!email || !password || !confirm) {
                showPopup("Please fill all fields", "warning");
                return;
            }

            if (password !== confirm) {
                showPopup("Passwords do not match", "danger");
                return;
            }

            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const result = await res.json();

            if (result.success) {
                showPopup(result.message, "success");
                setTimeout(() => showTab('login'), 1500);
            } else {
                showPopup(result.error, "danger");
            }
        }
    </script>

</body>
</html>
